version: '3.8'

# Roundtable Legends - Docker Compose Orchestration
# Start with: docker-compose up
# Stop with: docker-compose down

services:
  # FastAPI Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roundtable-backend
    ports:
      - "8000:8000"
    environment:
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
      - UPSTASH_VECTOR_REST_URL=${UPSTASH_VECTOR_REST_URL}
      - UPSTASH_VECTOR_REST_TOKEN=${UPSTASH_VECTOR_REST_TOKEN}
      - HF_TOKEN=${HF_TOKEN}
      - HF_MODEL_ID=${HF_MODEL_ID}
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - LOG_LEVEL=info
    volumes:
      - ./backend:/app/backend
      - ./static:/app/static
      - /tmp:/tmp  # For PDF exports
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - roundtable-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Streamlit Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: roundtable-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_CLIENT_LOGGER_ENABLED=true
    volumes:
      - ./frontend:/app/frontend
      - ./static:/app/static
      - streamlit-cache:/root/.streamlit/cache
    command: streamlit run frontend/app.py --server.port=8501 --server.address=0.0.0.0
    networks:
      - roundtable-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# Network for inter-service communication
networks:
  roundtable-network:
    driver: bridge

# Volumes for persistent data
volumes:
  streamlit-cache:
    driver: local
